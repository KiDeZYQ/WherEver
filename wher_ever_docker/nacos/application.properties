# Nacos Configuration for WherEver

# Application
spring.application.name=wher-ever

# Server
server.port=8848

# Database (for production use external MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/wher_ever?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL Init (for development only)
spring.sql.init.mode=never

# Dubbo (if needed in future)
dubbo.application.name=wher-ever
dubbo.registry.address=nacos://localhost:8848
